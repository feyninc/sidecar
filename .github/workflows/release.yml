name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag to publish.
        required: true
        default: latest
      dry-run:
        description: Run npm publish without uploading packages.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish npm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --workspaces --dry-run

      - name: Publish packages
        run: |
          DIST_TAG="${{ github.event_name == 'workflow_dispatch' && inputs['dist-tag'] || 'latest' }}"
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && inputs['dry-run'] || false }}"

          if [ "$DRY_RUN" = "true" ]; then
            npm run release:publish -- --tag "$DIST_TAG" --dry-run
          else
            npm run release:publish -- --tag "$DIST_TAG"
          fi
